#-----------------------------------------------------------------------------

$mainMod = SUPER

# =========================================================
# CORE WINDOW CONTROL
# Basic window operations (kill, floating, layout)
# =========================================================
bind = $mainMod, Q, killactive                       # Close active window
bind = $mainMod, SPACE, exec, hyprctl dispatch togglefloating && hyprctl dispatch resizeactive exact 65% 65% && hyprctl dispatch moveactive exact 15% 15%
bind = ALT, RETURN, fullscreen                      # Toggle fullscreen
bind = $mainMod, P, pseudo                          # Pseudo tiling
bind = $mainMod, J, layoutmsg, togglesplit          # Toggle split


# =========================================================
# APPLICATION LAUNCHER
# Quick access apps
# =========================================================
bind = $mainMod, RETURN, exec, $terminal             # Terminal
bind = $mainMod, D, exec, $menu                    # App launcher
bind = $mainMod, Z, exec, $browser                  # Browser
bind = $mainMod, E, exec, $explorer                 # File manager

# Utilities
bind = $mainMod, C, exec, $editor                      # VSCode
bind = $mainMod, I, exec, $notes                  # Notes app


# =========================================================
# WALLPAPER CONTROL (AWWW)
# Wallpaper switcher system
# =========================================================
bind = $mainMod, W, exec, ~/.config/AikoAi/wallpaper_select.sh   # Select wallpaper
bind = $mainMod SHIFT, W, exec, ~/.config/AikoAi/wallpaper_random.sh # Random wallpaper


# =========================================================
# CLIPBOARD MANAGEMENT
# =========================================================
bind = $mainMod, V, exec, $clipboard                # Clipboard history
bind = $mainMod SHIFT, V, exec, cliphist wipe      # Clear clipboard


# =========================================================
# SCREENSHOT SYSTEM
# Multiple modes (full, region, smart)
# =========================================================
bind = , Print, exec, ~/.config/AikoAi/screenshot.sh full
bind = SHIFT, Print, exec, ~/.config/AikoAi/screenshot.sh region
bind = CTRL, Print, exec, ~/.config/AikoAi/screenshot.sh copy
bind = CTRL SHIFT, Print, exec, ~/.config/AikoAi/screenshot.sh both

# Smart screenshot
bind = $mainMod, Print, exec, ~/.config/AikoAi/screenshot.sh smart
bind = $mainMod SHIFT, Print, exec, ~/.config/AikoAi/screenshot.sh smart-both
bind = $mainMod CTRL, Print, exec, ~/.config/AikoAi/screenshot.sh smart-copy

bind = $mainMod, O, exec, ~/.config/AikoAi/ocr-copy.sh  # OCR text


# =========================================================
# SYSTEM CONTROL
# Power & session management
# =========================================================
bind = $mainMod, L, exec, $lock                    # Lock screen

bind = $mainMod CTRL, DELETE, exec, $powermenu
bind = $mainMod CTRL SHIFT, Q, exec, $logout
bind = $mainMod CTRL SHIFT, S, exec, $shutdown
bind = $mainMod CTRL SHIFT, R, exec, $reboot
bind = $mainMod CTRL SHIFT, P, exec, $suspend

bind = $mainMod CTRL, R, exec, hyprctl reload      # Reload config


# =========================================================
# UI TOGGLES
# =========================================================
bind = $mainMod, TAB, exec, $fileManager           # Quick file manager
bind = $mainMod, B, exec, killall waybar || waybar # Toggle waybar
bind = SHIFT, ESCAPE, exec, kitty -e btop

# =========================================================
# SCRATCHPAD WORKSPACE
# Hidden workspace (like dropdown terminal)
# =========================================================
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

bind = $mainMod, T, exec, [workspace special:magic] $terminal
bind = $mainMod, M, exec, [workspace special:magic] $music


# =========================================================
# WINDOW FOCUS NAVIGATION
# =========================================================
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d


# =========================================================
# WORKSPACE MANAGEMENT
# =========================================================
# Switch workspace
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10


# =========================================================
# MOUSE CONTROLS
# =========================================================
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


# =========================================================
# MEDIA KEYS
# Volume, brightness, player control
# =========================================================
# Volume
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+ && swayosd-client --output-volume raise
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && swayosd-client --output-volume lower
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && swayosd-client --output-volume mute-toggle

# Mic
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle && swayosd-client --input-volume mute-toggle

# Brightness
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+ && swayosd-client --brightness raise
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%- && swayosd-client --brightness lower

# Media
bindl = ,XF86AudioNext, exec, playerctl next
bindl = ,XF86AudioPlay, exec, playerctl play-pause
bindl = ,XF86AudioPause, exec, playerctl play-pause
bindl = ,XF86AudioPrev, exec, playerctl previous


# =========================================================
# EXTRA / POWER MODES
# =========================================================
bind = $mainMod, SLASH, exec, cat ~/.config/hypr/keybinds_ui.txt | fuzzel --dmenu --prompt "ůįĆĆ Keybinds: "

bind = $mainMod, F1, exec, ~/.config/hypr/scripts/save-power.sh
bind = $mainMod, F2, exec, ~/.config/hypr/scripts/balance.sh
bind = $mainMod, F3, exec, ~/.config/hypr/scripts/daily.sh
bind = $mainMod, F4, exec, ~/.config/hypr/scripts/performance.sh

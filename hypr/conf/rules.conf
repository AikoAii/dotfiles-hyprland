#------------------------------------------------------------------------------------

# window rules — core behavior

# disable maximize 
windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

# fix xwayland drag issues
# windowrule {
#     name = xwayland-drag-fix
#     match:xwayland = true
#     match:float = true
#     no_focus = true
# }

# disable blur on xwayland float
windowrule = no_blur on, match:xwayland 1, match:float true


# appearance

# default opacity
windowrule = opacity 0.9 override 0.9 override, match:class ^(.*)$

# full opacity (browser)
windowrule = opacity 1 override 1 override, match:class ^(zen-browser|firefox|chromium|brave)$

# slight transparency (file manager)
windowrule = opacity 0.88 override 0.88 override, match:class ^(nemo)$


# picture-in-picture

windowrule {
    name = pip
    match:title = (?i)picture[-\s]?in[-\s]?picture

    float = true
    pin = true
    keep_aspect_ratio = true

    move = (monitor_w*0.75) (monitor_h*0.75)
    size = (monitor_w*0.25) (monitor_h*0.25)
}


# floating apps

# utilities
windowrule = float on, match:class ^(blueman-manager|nm-connection-editor|qalculate-qt|file-roller|qt5ct|qt6ct|org.kde.polkit-kde-authentication-agent-1)$

# centered utilities
windowrule = float on, center on, size (monitor_w*0.55) (monitor_h*0.65), match:class ^(qalculate-qt|file-roller)$

# audio control
windowrule = float on, size (monitor_w*0.48) (monitor_h*0.42), match:class ^(org.pulseaudio.pavucontrol)$


# dialogs

windowrule = float on, match:title ^(Open|Save As|Authentication Required|Choose Files|Open File)$
windowrule = float on, match:title ^(.*dialog.*)$
windowrule = float on, match:class ^(.*dialog.*)$


# idle inhibit

# video players
windowrule = idle_inhibit fullscreen, match:class ^(mpv|vlc|celluloid)$

# browsers (fullscreen video)
windowrule = idle_inhibit fullscreen, match:class ^(zen|firefox|chromium|brave)$


# portal (file picker fix)

windowrule = float on, center on, match:class ^(org.freedesktop.impl.portal.desktop.hyprland|org.freedesktop.impl.portal.desktop.gtk|xdg-desktop-portal-gtk)$


# special apps

# firefox pip fallback
windowrule = float on, match:class ^(firefox)$, match:title ^(Picture-in-Picture)$

# btop popup
windowrule = float on, center on, size (monitor_w*0.6) (monitor_h*0.7), match:class ^(btop-popup)$
windowrule = rounding 12, match:class ^(btop-popup)$
windowrule = opacity 0.95 override 0.95 override, match:class ^(btop-popup)$

# fastfetch popup
windowrule = float on, center on, match:class ^(fastfetch-popup)$
windowrule = no_blur on, match:class ^(fastfetch-popup)$
windowrule = opacity 1 override 1 override, match:class ^(fastfetch-popup)$


# layer rules

# fuzzel blur
layerrule = blur on, ignore_alpha 0, match:namespace fuzzel
